name: Build and Deploy Daily Briefing
on:
  push:
    branches:
      - source
  workflow_dispatch:

permissions:
  contents: write

jobs:
  build-and-deploy:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout source branch
        uses: actions/checkout@v4
        with:
          ref: source
      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'
      - name: Install dependencies
        run: npm install --legacy-peer-deps
      - name: Build React app
        run: npx vite build
      - name: Debug — show structure
        run: |
          echo "=== repo root ==="
          ls -la
          echo "=== dist if it exists ==="
          ls -la dist 2>/dev/null || echo "no ./dist"
          echo "=== client/dist if it exists ==="
          ls -la client/dist 2>/dev/null || echo "no ./client/dist"
          echo "=== find all index.html ==="
          find . -name "index.html" -not -path "./node_modules/*"
      - name: Deploy to main branch
        run: |
          cd dist
          git init
          git config user.email "deploy@baywashauto.com"
          git config user.name "Baywash Deploy Bot"
          git checkout -b main
          git add -A
          git commit -m "Daily briefing: $(date +%Y-%m-%d)"
          git remote add origin https://x-access-token:${{ secrets.GITHUB_TOKEN }}@github.com/mikebaywashauto-dev/baywash-daily-briefing.git
          git push --force origin main
